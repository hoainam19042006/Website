<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../../../../CSS/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
    <section class="login__section">
        <div class="auth-container">
            <div class="logo">
                <img src="../../../../assets/logo.png">
            </div>

            <h1 class="auth-title">Đăng nhập</h1>
            <p class="auth-subtitle">Chào mừng trở lại cộng đồng</p>

            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" placeholder="nhap@email.com">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" class="form-control">
            </div>

            <div class="row">
                <label>
                <input type="checkbox"> Ghi nhớ đăng nhập
            </label>

                <a href="#" class="forgot">
                Quên mật khẩu?
            </a>
            </div>

            <button class="btn btn-green">
                Đăng nhập
                </button>

            <div class="divider">
                <a>Hoặc tiếp tục với</a>
            </div>


            <div class="social">
                <button>Google</button>
                <button class="facebook">Facebook</button>
            </div>


            <p style="text-align: center; margin-top: 25px;">
                Đã có tài khoản
                <a href="../../../../DangKy.html">Đăng ký ngay</a>
            </p>
        </div>
    </section>
</body>
</html>
