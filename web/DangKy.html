<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../../../../CSS/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet" />
</head>

<body>
<section class="login__section">
    <div class="auth-container">
        <h1 class="auth-title">Đăng ký tài khoản</h1>

        <p class="auth-subtitle">
            Tham gia cộng đồng HealthyCare News
        </p>

        <div class="form-group">
            <label>Họ và tên</label>
            <input class="form-control" placeholder="Nguyễn Văn A">
        </div>

        <div class="form-group">
            <label>Địa chỉ Email</label>
            <input class="form-control" placeholder="email@vi-du.com">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" class="form-control">
        </div>

        <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <input type="password" class="form-control">
        </div>

        <div class="row">
            <label>
                <input type="checkbox">Tôi đồng ý với điều khoản dịch vụ và Chính sách bảo mật của Đời sống sức khoẻ
            </label>
        </div>
        <a><button class="btn btn-green">Đăng ký ngay</button></a>

        <div class="divider">
            <span>HOẶC</span>
        </div>

        <div class="social">
            <button>Google</button>
        </div>

        <p style="text-align: center; margin-top: 25px;">
            Đã có tài khoản?
            <a href="../../../../DangNhap.html" class="return_login">Đăng nhập ngay</a>
        </p>
    </div>
</section>
</body>

</html>
